<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQI Education</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 10%;
    background:#fff;
    border: 1px solid black;
}


nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}

nav a{
    text-decoration:none;
    color:#333;
}

.hero{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:80px 10%;
    min-height:80vh;
}

.hero-text{
    max-width:500px;
}

.hero-text h1{
    font-size:72px;
    line-height:1.1;
    color:#3b3b6d;
}

.hero-text p{
    margin:25px 0;
    color:#666;
    line-height:1.6;
}

.hero-text button{
    background:#5b57e6;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:10px;
    cursor:pointer;
}

.heroimg{
    width:500px;
    max-width:100%;
}

.second-section{
    padding:80px 10%;
}

.second-section h2{
    font-size:60px;
    color:#3b3b6d;
}

.logo{
    height:70px;
}



</style>
</head>
<body>

<header>
    <img class="logo" src="co.jpg" alt="">

    <nav>
        <ul>
            <li><a href="#">About</a></li>
            <li><a href="#">Programmes</a></li>
            <li><a href="#">Admissions</a></li>
            <li><a href="#">E-Portal</a></li>
            <li><a href="#">SQI Scholarship</a></li>
            <li><a href="#">News</a></li>
        </ul>
    </nav>
</header>

<!-- HERO SECTION -->
<section class="hero">

    <div class="hero-text">
        <h1>
            Study to <br>
            become a <br>
            global talent
        </h1>

        <p>
            Learn new tech skills using a world-class curriculum from top industry experts in an accredited institution.
        </p>

        <button>Start Now</button>
    </div>

    <div class="heroimg">
        <img src="bg-header-sqi-1.png" alt="Students">
    </div>

</section>

<section class="second-section">
    <h2>Start here. Change the world.</h2>
</section>

</body>
</html>
